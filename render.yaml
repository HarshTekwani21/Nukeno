# Render.com Blueprint - Nukeno AI Assistant
# Deploy both backend and frontend services

services:
  # Backend API Service
  - type: web
    name: nukeno-backend
    env: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"

  # Frontend Static Site (React SPA)
  - type: web
    name: nukeno-frontend
    env: static
    buildCommand: |
      cd frontend
      npm install
      npm run build
      echo "/* /index.html 200" > dist/_redirects
    staticPublishPath: frontend/dist
    headers:
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: nukeno-backend
          envVarKey: RENDER_EXTERNAL_URL
