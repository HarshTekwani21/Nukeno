name: Deploy to Firebase + Cloud Run

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Auth with Google Cloud ──────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: nukeno-deploy

      # ── Enable required APIs ───────────────────────────────────────────────
      - name: Enable Cloud Run & Cloud Build APIs
        run: |
          gcloud services enable run.googleapis.com \
            cloudbuild.googleapis.com \
            artifactregistry.googleapis.com \
            --project nukeno-deploy

      # ── Deploy FastAPI backend to Cloud Run ────────────────────────────────
      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy nukeno-backend \
            --source ./backend \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --project nukeno-deploy \
            --quiet

      # ── Build React frontend ───────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── Deploy frontend to Firebase Hosting ───────────────────────────────
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          projectId: nukeno-deploy
          channelId: live
